services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.28.1@sha256:a9d328123ff8a61bf6b16448528b577d59deb85758172e13b09054b0727f8adf
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-commerce_demo}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-demo}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-demo_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          clickhouse-client
          --user "$${CLICKHOUSE_USER}"
          --password "$${CLICKHOUSE_PASSWORD}"
          --database "$${CLICKHOUSE_DB}"
          --query "SELECT 1"
      interval: 3s
      timeout: 3s
      retries: 25
      start_period: 5s
    stop_grace_period: 30s

  tbls:
    image: ghcr.io/k1low/tbls:v1.95.0@sha256:5d194e7baa9d14e740ee41f29985b8cb7601926fca019a4bb0c34b8c937bd8cb
    profiles:
      - tools
    working_dir: /work
    volumes:
      - .:/work
    environment:
      TBLS_DSN: clickhouse://${CLICKHOUSE_USER:-demo}:${CLICKHOUSE_PASSWORD:-demo_password}@clickhouse:9000/${CLICKHOUSE_DB:-commerce_demo}
      TBLS_DOC_PATH: ${TBLS_DOC_PATH:-catalog/commerce_demo/generated/raw}
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
