services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.28.1@sha256:a9d328123ff8a61bf6b16448528b577d59deb85758172e13b09054b0727f8adf
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-commerce_demo}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-demo}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-demo_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          clickhouse-client
          --user "$${CLICKHOUSE_USER}"
          --password "$${CLICKHOUSE_PASSWORD}"
          --database "$${CLICKHOUSE_DB}"
          --query "SELECT 1"
      interval: 3s
      timeout: 3s
      retries: 25
      start_period: 5s
    stop_grace_period: 30s

volumes:
  clickhouse_data:
