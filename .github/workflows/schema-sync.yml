name: Scheduled Schema Sync

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: Run once even when the repository feature flag is disabled
        type: boolean
        required: true
        default: false
  schedule:
    # 01:17 Asia/Ho_Chi_Minh (UTC+7), every day.
    - cron: "17 18 * * *"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: schema-sync
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  sync:
    name: schema-sync
    if: vars.SCHEMA_SYNC_ENABLED == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_run)
    runs-on: [self-hosted, schema-sync]
    env:
      SCHEMA_SYNC_ENABLED: ${{ vars.SCHEMA_SYNC_ENABLED == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_run) }}
    steps:
      - name: Validate runner and bot contract
        env:
          BOT_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          for tool in git gh docker python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Required runner tool is missing: $tool"
              exit 1
            fi
          done
          docker compose version >/dev/null
          if [[ -z "$BOT_TOKEN" ]]; then
            echo "METADATA_BOT_TOKEN is required for schema-sync PR automation."
            exit 1
          fi

      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.METADATA_BOT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: make install

      - name: Resolve the single active schema-sync PR
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          ./scripts/metadata schema-sync-pr-prepare \
            --repository-root . \
            --state build/schema-sync/pr-state.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Extract and stage every scheduled database
        env:
          TBLS_DSN_COMMERCE_DEMO: ${{ secrets.TBLS_DSN_COMMERCE_DEMO }}
          TBLS_DSN_URCARD: ${{ secrets.TBLS_DSN_URCARD }}
          TBLS_DSN_URGIFT: ${{ secrets.TBLS_DSN_URGIFT }}
        run: |
          make scheduled-sync \
            SCHEMA_SYNC_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Create or update the schema-sync Draft PR
        id: publish
        env:
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          ./scripts/metadata schema-sync-pr-publish \
            --repository-root . \
            --state build/schema-sync/pr-state.json \
            --report build/schema-sync/report.json \
            --pr-body build/schema-sync/pr-body.md \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Write schema-sync summary
        if: always()
        env:
          ACTIVE_PR: ${{ steps.prepare.outputs.number }}
          ACTION: ${{ steps.publish.outputs.action }}
          BRANCH: ${{ steps.publish.outputs.branch || steps.prepare.outputs.branch }}
          PR_URL: ${{ steps.publish.outputs.pr_url || steps.prepare.outputs.url }}
        run: |
          {
            echo "## Scheduled Schema Sync"
            echo
            echo "- Existing PR: \`${ACTIVE_PR:-none}\`"
            echo "- Publish action: \`${ACTION:-none}\`"
            echo "- Branch: \`${BRANCH:-main}\`"
            echo "- Pull Request: ${PR_URL:-not-created}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f build/schema-sync/report.json ]]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = json.loads(Path("build/schema-sync/report.json").read_text(encoding="utf-8"))
          print(f"- Core outcome: `{report['outcome']}`")
          print(f"- Databases inspected: `{len(report['databases'])}`")
          PY
          fi
