name: Scheduled Schema Sync

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: Run once even when the repository feature flag is disabled
        type: boolean
        required: true
        default: false
  schedule:
    # 01:17 Asia/Ho_Chi_Minh (UTC+7), every day.
    - cron: "17 18 * * *"

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: schema-sync
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  TELEGRAM_NOTIFICATIONS_ENABLED: ${{ vars.TELEGRAM_NOTIFICATIONS_ENABLED || 'false' }}

jobs:
  sync:
    name: schema-sync
    if: vars.SCHEMA_SYNC_ENABLED == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_run)
    runs-on: [self-hosted, schema-sync]
    env:
      SCHEMA_SYNC_ENABLED: ${{ vars.SCHEMA_SYNC_ENABLED == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_run) }}
    steps:
      - name: Validate runner and bot contract
        env:
          BOT_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          for tool in git gh docker uv; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Required runner tool is missing: $tool"
              exit 1
            fi
          done
          docker compose version >/dev/null
          "$(uv python find 3.11)" --version
          if [[ -z "$BOT_TOKEN" ]]; then
            echo "METADATA_BOT_TOKEN is required for schema-sync PR automation."
            exit 1
          fi

      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.METADATA_BOT_TOKEN }}

      - name: Install with the runner-managed Python 3.11
        run: make install PYTHON_BOOTSTRAP="$(uv python find 3.11)"

      - name: Resolve the single active schema-sync PR
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          ./scripts/metadata schema-sync-pr-prepare \
            --repository-root . \
            --state build/schema-sync/pr-state.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Extract and stage every scheduled database
        env:
          TBLS_DSN_COMMERCE_DEMO: ${{ secrets.TBLS_DSN_COMMERCE_DEMO }}
          TBLS_DSN_URCARD: ${{ secrets.TBLS_DSN_URCARD }}
          TBLS_DSN_URGIFT: ${{ secrets.TBLS_DSN_URGIFT }}
        run: |
          make scheduled-sync \
            SCHEMA_SYNC_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Create or update the schema-sync Draft PR
        id: publish
        env:
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          ./scripts/metadata schema-sync-pr-publish \
            --repository-root . \
            --state build/schema-sync/pr-state.json \
            --report build/schema-sync/report.json \
            --pr-body build/schema-sync/pr-body.md \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve pr_review notification context
        id: notification
        if: >-
          env.TELEGRAM_NOTIFICATIONS_ENABLED == 'true' &&
          (steps.publish.outputs.action == 'created' || steps.publish.outputs.action == 'updated')
        env:
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          COMMIT: ${{ steps.publish.outputs.commit }}
        run: |
          pr_number="$(gh pr view "$PR_URL" --json number --jq '.number')"
          marker="<!-- metadata-notification:pr_review:${COMMIT} -->"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "marker=$marker" >> "$GITHUB_OUTPUT"
          if gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
            --jq '.[].body' | grep --fixed-strings --quiet -- "$marker"; then
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build validated pr_review event
        if: steps.notification.outputs.should_send == 'true'
        env:
          ACTION: ${{ steps.publish.outputs.action }}
          BRANCH: ${{ steps.publish.outputs.branch }}
          COMMIT: ${{ steps.publish.outputs.commit }}
          PR_NUMBER: ${{ steps.notification.outputs.pr_number }}
          PR_URL: ${{ steps.publish.outputs.pr_url }}
        run: |
          ./scripts/metadata build-pr-review-notification \
            --report build/schema-sync/report.json \
            --action "$ACTION" \
            --pr-number "$PR_NUMBER" \
            --pr-url "$PR_URL" \
            --repository "$GITHUB_REPOSITORY" \
            --branch "$BRANCH" \
            --commit "$COMMIT" \
            --workflow "$GITHUB_WORKFLOW" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output build/schema-sync/pr-review-notification.json

      - name: Notify reviewer through Telegram
        if: steps.notification.outputs.should_send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          ./scripts/metadata notify \
            --event-file build/schema-sync/pr-review-notification.json

      - name: Record successful pr_review delivery
        if: steps.notification.outputs.should_send == 'true'
        env:
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
          MARKER: ${{ steps.notification.outputs.marker }}
          PR_NUMBER: ${{ steps.notification.outputs.pr_number }}
        run: gh pr comment "$PR_NUMBER" --body "$MARKER"

      - name: Write schema-sync summary
        if: always()
        env:
          ACTIVE_PR: ${{ steps.prepare.outputs.number }}
          ACTION: ${{ steps.publish.outputs.action }}
          BRANCH: ${{ steps.publish.outputs.branch || steps.prepare.outputs.branch }}
          PR_URL: ${{ steps.publish.outputs.pr_url || steps.prepare.outputs.url }}
        run: |
          {
            echo "## Scheduled Schema Sync"
            echo
            echo "- Existing PR: \`${ACTIVE_PR:-none}\`"
            echo "- Publish action: \`${ACTION:-none}\`"
            echo "- Branch: \`${BRANCH:-main}\`"
            echo "- Pull Request: ${PR_URL:-not-created}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f build/schema-sync/report.json ]]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = json.loads(Path("build/schema-sync/report.json").read_text(encoding="utf-8"))
          print(f"- Core outcome: `{report['outcome']}`")
          print(f"- Databases inspected: `{len(report['databases'])}`")
          PY
          fi
