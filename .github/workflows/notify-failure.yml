name: Metadata Failure Notification

on:
  workflow_run:
    workflows:
      - Scheduled Schema Sync
      - Schema Sync UAT
      - Metadata PR
      - Index Manifest
      - Quality
      - Live LLM UAT
    types: [completed]

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  notify:
    name: notify-job-failure
    if: >-
      vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true' &&
      (github.event.workflow_run.conclusion == 'failure' ||
       github.event.workflow_run.conclusion == 'timed_out' ||
       github.event.workflow_run.conclusion == 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted notification code from main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: make install

      - name: Collect failed job names from the Actions API
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          mkdir -p build/notifications
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled") | .name' \
            > build/notifications/failed-jobs.txt
          if [[ ! -s build/notifications/failed-jobs.txt ]]; then
            echo "workflow:${CONCLUSION}" > build/notifications/failed-jobs.txt
          fi

      - name: Build validated job_failed event
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || 'unknown' }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          ./scripts/metadata build-job-failed-notification \
            --run-id "$RUN_ID" \
            --attempt "$ATTEMPT" \
            --conclusion "$CONCLUSION" \
            --failed-jobs-file build/notifications/failed-jobs.txt \
            --actor "$ACTOR" \
            --repository "$GITHUB_REPOSITORY" \
            --branch "$HEAD_BRANCH" \
            --commit "$HEAD_SHA" \
            --workflow "$WORKFLOW_NAME" \
            --run-url "$RUN_URL" \
            --output build/notifications/job-failed.json

      - name: Notify operators through Telegram
        env:
          TELEGRAM_NOTIFICATIONS_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: ./scripts/metadata notify --event-file build/notifications/job-failed.json
