name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --editable '.[dev]'
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --editable '.[dev]'
      - run: mypy

  unit-tests:
    name: Unit and contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: mkdir -p build/test-results
      - run: make coverage PYTEST_ARGS="--junitxml=build/test-results/unit.xml"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: build/test-results/unit.xml
          retention-days: 7

  reviewer-metadata:
    name: Reviewer metadata contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: make review-check
      - name: Verify generated JSON Schema is committed
        run: git diff --exit-code -- contracts/reviewer_metadata.schema.json

  published-knowledge:
    name: Candidate and published knowledge contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: make catalog-check-all
      - name: Validate committed candidates without LLM access
        run: |
          for database in $(./scripts/metadata list-databases); do
            make candidate-validate DATABASE="$database"
          done
      - name: Verify candidate validation is read-only
        run: test -z "$(git status --porcelain -- 'catalog/*/generated/structured' 'catalog/*/generated/published')"

  clickhouse-fixture:
    name: ClickHouse fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: make db-up db-check
      - name: Show ClickHouse logs on failure
        if: failure()
        run: make db-logs
      - name: Stop ClickHouse
        if: always()
        run: make db-down

  tbls-schema:
    name: tbls schema extraction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: make db-up schema-check
      - name: Verify generated schema is committed
        run: git diff --exit-code -- catalog/commerce_demo/generated/raw
      - name: Show ClickHouse logs on failure
        if: failure()
        run: make db-logs
      - name: Stop ClickHouse
        if: always()
        run: make db-down
