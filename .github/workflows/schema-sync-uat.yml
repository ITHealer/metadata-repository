name: Schema Sync UAT

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Schema source used for a manual fixture UAT run
        type: choice
        required: true
        default: baseline
        options:
          - baseline
          - additive_test

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: schema-sync-uat
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  sync:
    name: schema-sync-uat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.METADATA_BOT_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: make install

      - name: Preserve the committed schema for the PR summary
        run: |
          mkdir -p build
          if git cat-file -e HEAD:catalog/commerce_demo/generated/raw/schema.json; then
            git show HEAD:catalog/commerce_demo/generated/raw/schema.json > build/schema-before.json
          else
            printf '%s\n' \
              '{"name":"commerce_demo","desc":"Initial empty catalog","tables":[],"relations":[]}' \
              > build/schema-before.json
          fi

      - name: Start the reproducible ClickHouse source
        run: make db-up

      - name: Apply selected UAT schema scenario
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: ./scripts/apply_schema_sync_fixture.sh "$SCENARIO"

      - name: Extract and lint the live schema
        run: make schema-doc schema-lint

      - name: Assert selected UAT schema scenario
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: |
          if [[ "$SCENARIO" == "additive_test" ]]; then
            grep --fixed-strings --quiet '"name": "channel"' \
              catalog/commerce_demo/generated/raw/schema.json
          elif grep --fixed-strings --quiet '"name": "channel"' \
            catalog/commerce_demo/generated/raw/schema.json; then
            echo "Baseline unexpectedly contains commerce_demo.orders.channel."
            exit 1
          fi

      - name: Refresh reviewer drafts and report validation
        id: review
        run: |
          set +e
          make review-draft 2>&1 | tee build/review-draft.log
          draft_status=${PIPESTATUS[0]}
          make review-validate 2>&1 | tee build/review-validate.log
          validate_status=${PIPESTATUS[0]}
          set -e
          echo "draft_status=$draft_status" >> "$GITHUB_OUTPUT"
          echo "validate_status=$validate_status" >> "$GITHUB_OUTPUT"

      - name: Detect synchronized source changes
        id: diff
        run: |
          catalog_status="$(git status --porcelain=v1 --untracked-files=all -- catalog)"
          if [[ -z "$catalog_status" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Schema is already synchronized."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$catalog_status"
          fi

      - name: Build draft Pull Request description
        if: steps.diff.outputs.changed == 'true'
        run: |
          ./scripts/metadata schema-sync-summary \
            --before build/schema-before.json \
            --after catalog/commerce_demo/generated/raw/schema.json \
            --output build/schema-sync-pr.md
          {
            echo "## Automation validation"
            echo
            echo "- Draft refresh exit code: \`${{ steps.review.outputs.draft_status }}\`"
            echo "- Review validation exit code: \`${{ steps.review.outputs.validate_status }}\`"
          } >> build/schema-sync-pr.md

      - name: Create fixture UAT branch and Draft PR
        if: steps.diff.outputs.changed == 'true'
        env:
          BOT_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.METADATA_BOT_TOKEN }}
        run: |
          if [[ -z "$BOT_TOKEN" ]]; then
            echo "METADATA_BOT_TOKEN is required to publish the fixture UAT Draft PR."
            exit 1
          fi
          unexpected="$(git status --porcelain | awk '$2 !~ /^catalog\/[^/]+\/(generated\/raw|review)\// {print}')"
          if [[ -n "$unexpected" ]]; then
            echo "Fixture UAT changed files outside its allowlist:"
            echo "$unexpected"
            exit 1
          fi
          branch="automation/fixture-schema-sync-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch -c "$branch"
          git config user.name "metadata-bot"
          git config user.email "metadata-bot@users.noreply.github.com"
          git add -- catalog
          git commit -m "chore(schema): synchronize ClickHouse fixture metadata"
          git push origin "HEAD:$branch"
          gh pr create \
            --draft \
            --base main \
            --head "$branch" \
            --title "chore(schema): validate fixture synchronization" \
            --body-file build/schema-sync-pr.md

      - name: Show ClickHouse logs on failure
        if: failure()
        run: make db-logs

      - name: Stop ClickHouse
        if: always()
        run: make db-down
